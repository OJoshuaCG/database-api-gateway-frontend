server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Cabeceras de seguridad de la capa de servido (ver docs/security.md §8).
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  # connect-src 'self' asume que la API se sirve bajo el mismo (sub)dominio via
  # proxy (ver docs/dokploy.md). Si el backend vive en otro dominio, añade su
  # origen aquí, p. ej.: connect-src 'self' https://api.dominio.com;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

  # index.html nunca se cachea: sirve como entrypoint de cada deploy.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Activos con hash en el nombre de archivo (generados por Vite) → caché larga.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fallback SPA: cualquier ruta desconocida (p. ej. /servers/42) sirve index.html
  # para que BrowserRouter la resuelva en el cliente. Imprescindible: sin esto,
  # recargar una ruta profunda da 404.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
